name: Release

# Builds and publishes installers for every supported platform when a version
# tag is pushed (or on manual dispatch). Signing is applied only when the
# relevant secrets are set; without them the build still succeeds, unsigned.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Each arch builds on a runner of that arch so bundle:python fetches the
        # matching relocatable interpreter. macOS is split into two jobs (Apple
        # Silicon on macos-14, Intel on macos-13) because a single invocation
        # cannot bundle both architectures of the interpreter at once.
        include:
          - os: macos-14
            label: macOS (Apple Silicon)
            builder: --mac --arm64
          - os: macos-13
            label: macOS (Intel)
            builder: --mac --x64
          - os: ubuntu-22.04
            label: Linux x64
            builder: --linux --x64
          - os: ubuntu-24.04-arm
            label: Linux arm64 (Raspberry Pi)
            builder: --linux --arm64
          - os: windows-latest
            label: Windows x64
            builder: --win --x64
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        # The bundled interpreter carries torch and the DA3 stack (several GB),
        # and electron-builder then stages the AppImage from it. That exceeds the
        # Ubuntu runner's free disk, which fails packaging with "No space left on
        # device". Reclaim the preinstalled toolchains this build never uses
        # (~20 GB) before building.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      # No version here: pnpm/action-setup reads it from package.json's
      # packageManager field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libraries
        run: pnpm build:libs

      - name: Fetch live-depth model assets
        # Bundles the Depth Anything V2 ONNX model + ort wasm so the shipped app
        # has the live preview offline. Remove this step for a smaller installer.
        run: pnpm --filter @monoclejs/desktop fetch:models

      - name: Configure macOS signing and notarization
        if: runner.os == 'macOS'
        run: |
          # Signing: the Developer ID cert (base64) and its export password.
          echo "CSC_LINK=${{ secrets.MAC_CSC_LINK }}" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          # Notarization: the Apple ID plus an app-specific password. The Team ID
          # is read from the existing APPLE_API_KEY_ID secret, which holds the
          # team id here (reused so it does not have to be set again). Notarization
          # only runs when APPLE_ID is present; signing alone works without it.
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Configure Windows signing
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CSC_LINK=${{ secrets.WINDOWS_CSC_LINK }}" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build renderer and main bundles
        run: pnpm --filter @monoclejs/desktop build

      - name: Bundle the Python interpreter
        # Downloads a relocatable interpreter for this runner's platform and arch
        # and installs the sidecar into it, so the shipped installer reconstructs
        # without any local Python. continue-on-error so a platform that cannot
        # build a heavy dependency still publishes a signed installer (the app
        # falls back to a local Python for reconstruction on that platform).
        #
        # Linux ships walk-only (--extras walk): the full torch/DA3 bundle pushes
        # the AppImage past GitHub's 2 GiB per-asset limit. The default Object
        # scan (DA2 + Open3D) still works offline; the DA3 multi-view path on
        # Linux needs a local Python. macOS and Windows ship the full stack
        # (~1.2-1.3 GB installers, under the limit).
        continue-on-error: true
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            pnpm --filter @monoclejs/desktop bundle:python -- --extras walk
          else
            pnpm --filter @monoclejs/desktop bundle:python
          fi

      - name: Verify the bundled numpy is portable (macOS)
        if: runner.os == 'macOS'
        shell: bash
        # The bundle is built on macos-14, where pip would otherwise install the
        # Accelerate build of numpy/scipy (macOS 14+ only), which crashes on a
        # user's macOS 11-13 the moment numpy imports. bundle:python re-pins the
        # OpenBLAS wheel; this is the authoritative gate that blocks a publish if
        # that pin did not take (bundle:python is continue-on-error, so a failure
        # there must not silently ship). Skips cleanly if no interpreter bundled.
        run: |
          PY=apps/desktop/resources/python/bin/python3
          if [ ! -x "$PY" ]; then
            echo "no bundled interpreter on this platform; nothing to verify"
            exit 0
          fi
          "$PY" - <<'PYEOF'
          import sys
          import numpy
          numpy.array([1.0, 2.0]).dot(numpy.array([3.0, 4.0]))  # dlopens BLAS
          try:
              blas = numpy.show_config("dicts")["Build Dependencies"]["blas"]["name"].lower()
          except Exception as exc:  # unknown config shape: do not block on a parse gap
              print(f"numpy {numpy.__version__}: could not read BLAS name ({exc}); skipping")
              sys.exit(0)
          print(f"bundled numpy {numpy.__version__} BLAS: {blas}")
          if "accelerate" in blas:
              sys.exit(
                  "FATAL: bundled numpy links Apple Accelerate (macOS 14+ only) and "
                  "would crash on macOS 11-13. The OpenBLAS pin did not take."
              )
          PYEOF

      - name: Package and publish
        shell: bash
        run: |
          # macOS's default open-file limit (256) is too low for electron-builder
          # to code-sign the many small files in the bundled Python interpreter,
          # which fails with EMFILE. Raise it where the shell allows; this is a
          # no-op on the Windows runner (git-bash), which does not hit the limit.
          ulimit -n 65536 2>/dev/null || ulimit -n 10240 2>/dev/null || true
          pnpm --filter @monoclejs/desktop exec electron-builder ${{ matrix.builder }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

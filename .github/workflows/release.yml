name: Release

# Builds and publishes installers for every supported platform when a version
# tag is pushed (or on manual dispatch). Signing is applied only when the
# relevant secrets are set; without them the build still succeeds, unsigned.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Each arch builds on a runner of that arch so bundle:python fetches the
        # matching relocatable interpreter. macOS is split into two jobs (Apple
        # Silicon on macos-14, Intel on macos-13) because a single invocation
        # cannot bundle both architectures of the interpreter at once.
        include:
          - os: macos-14
            label: macOS (Apple Silicon)
            builder: --mac --arm64
          - os: macos-13
            label: macOS (Intel)
            builder: --mac --x64
          - os: ubuntu-22.04
            label: Linux x64
            builder: --linux --x64
          - os: ubuntu-24.04-arm
            label: Linux arm64 (Raspberry Pi)
            builder: --linux --arm64
          - os: windows-latest
            label: Windows x64
            builder: --win --x64
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        # The lean walk build is small, but reclaim the preinstalled toolchains
        # this build never uses (~20 GB) anyway, so a `--extras walk,multiview`
        # build (torch + DA3, several GB staged into the AppImage) does not hit
        # "No space left on device" on the Ubuntu runner.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      # No version here: pnpm/action-setup reads it from package.json's
      # packageManager field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libraries
        run: pnpm build:libs

      - name: Fetch live-depth model assets
        # Bundles the Depth Anything V2 ONNX model + ort wasm so the shipped app
        # has the live preview offline. Remove this step for a smaller installer.
        run: pnpm --filter @monoclejs/desktop fetch:models

      - name: Configure macOS signing and notarization
        if: runner.os == 'macOS'
        run: |
          # Signing: the Developer ID cert (base64) and its export password.
          echo "CSC_LINK=${{ secrets.MAC_CSC_LINK }}" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          # Notarization: the Apple ID plus an app-specific password. The Team ID
          # is read from the existing APPLE_API_KEY_ID secret, which holds the
          # team id here (reused so it does not have to be set again). Notarization
          # only runs when APPLE_ID is present; signing alone works without it.
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Configure Windows signing
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CSC_LINK=${{ secrets.WINDOWS_CSC_LINK }}" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build renderer and main bundles
        run: pnpm --filter @monoclejs/desktop build

      - name: Bundle the Python interpreter
        # Downloads a relocatable interpreter for this runner's platform and arch
        # and installs the sidecar into it, so the shipped installer reconstructs
        # without any local Python. continue-on-error so a platform that cannot
        # build a heavy dependency still publishes a signed installer (the app
        # falls back to a local Python for reconstruction on that platform).
        #
        # Every platform ships walk-only (--extras walk): the default Object scan
        # (DA2 depth + visual odometry + Open3D TSDF) works fully offline in a
        # ~650 MB installer. The heavy Depth Anything 3 multi-view stack (torch +
        # DA3 weights, ~3 GB) is NOT bundled; the app downloads it on demand into
        # user app-data when the user opts in (see src/main/da3/pack.ts). This
        # keeps the installer small and off the macOS 12 floor, since torch's
        # arm64-macOS wheels are macOS 14+ anyway.
        continue-on-error: true
        shell: bash
        run: pnpm --filter @monoclejs/desktop bundle:python -- --extras walk

      - name: Verify the bundled interpreter
        # A hard gate that blocks the publish if the interpreter did not bundle
        # (bundle:python is continue-on-error, so a tar/download failure must not
        # silently ship an installer with no reconstruction). Runs everywhere
        # except arm64 Linux, which legitimately cannot bundle: open3d and
        # opencv-contrib ship no cp312 aarch64-linux wheels, so it ships
        # interpreter-less and reconstructs only with a local Python. On macOS it
        # also confirms numpy links OpenBLAS, not the macOS-14-only Accelerate
        # build that would crash on a user's macOS 11-13.
        if: ${{ !(runner.os == 'Linux' && contains(matrix.builder, 'arm64')) }}
        shell: bash
        run: |
          PY=apps/desktop/resources/python/bin/python3
          [ -f "$PY" ] || PY=apps/desktop/resources/python/python.exe
          if [ ! -f "$PY" ]; then
            echo "FATAL: bundle:python produced no interpreter; this platform must ship one."
            exit 1
          fi
          "$PY" - <<'PYEOF'
          import platform
          import sys

          import numpy

          numpy.array([1.0, 2.0]).dot(numpy.array([3.0, 4.0]))  # dlopens BLAS
          print(f"bundled numpy {numpy.__version__} imports and computes on {platform.system()}")
          if platform.system() == "Darwin":
              try:
                  blas = numpy.show_config("dicts")["Build Dependencies"]["blas"]["name"].lower()
              except Exception as exc:
                  # Fail closed where the bug can hide. On a macOS 14+ build host an
                  # Accelerate wheel imports fine, so this string check is the only
                  # thing catching it; a parse gap there must abort, not skip. On an
                  # older host an Accelerate wheel would already have crashed the
                  # import above, so degrade to a warning there.
                  major = int((platform.mac_ver()[0] or "0").split(".")[0])
                  if major >= 14:
                      sys.exit(f"FATAL: cannot confirm OpenBLAS on a macOS {major} build host ({exc}).")
                  print(f"could not read BLAS name ({exc}) on macOS {major}; import already proved it loads; skipping")
                  sys.exit(0)
              print(f"macOS BLAS: {blas}")
              if "accelerate" in blas:
                  sys.exit(
                      "FATAL: bundled numpy links Apple Accelerate (macOS 14+ only) and "
                      "would crash on macOS 11-13. The OpenBLAS pin did not take."
                  )
          PYEOF

          # The release builds on macOS 14, where every bundled wheel imports fine,
          # so an import test cannot catch a wheel that will fail to load on the
          # app's macOS 12 support floor. Three separate releases shipped broken
          # this way: v1.0.0's onnxruntime (macosx_14, std::pmr), a numpy Accelerate
          # wheel (macosx_14), and v1.0.1's opencv 5.0 pre-release (macosx_13,
          # ffmpeg AVFoundation DeskView). Each imports on this host and dlopen-fails
          # on macOS 12. A wheel's own platform tag is host-independent, so gate on
          # that: any macosx_13+ wheel was built for a newer OS than we support.
          if [ "${{ runner.os }}" = "macOS" ]; then
            "$PY" - <<'PYEOF'
          import pathlib
          import re
          import sys

          FLOOR_MAJOR = 13  # fail on macosx_13_0 and up; the default scan supports macOS 12+
          # The optional Depth Anything 3 multi-view stack is macOS 14+ on Mac
          # anyway (recent arm64 torch wheels are macosx_14 and torch-MPS needs
          # macOS 14), so these are allowed above the floor: they are dead weight
          # on macOS 12 but the default walk-around scan never imports them, so
          # they cannot break it. Everything else must load on macOS 12.
          ALLOW_ABOVE_FLOOR = {"torch", "torchvision", "pycolmap", "xformers"}
          root = pathlib.Path("apps/desktop/resources/python")
          bad, allowed = set(), set()
          for wheel in root.rglob("*.dist-info/WHEEL"):
              name = wheel.parent.name.split("-", 1)[0].replace("_", "-").lower()
              for line in wheel.read_text().splitlines():
                  if not line.startswith("Tag:"):
                      continue
                  for major in re.findall(r"macosx_(\d+)_\d+", line):
                      if int(major) < FLOOR_MAJOR:
                          continue
                      entry = f"{wheel.parent.name}: {line.split(':', 1)[1].strip()}"
                      (allowed if name in ALLOW_ABOVE_FLOOR else bad).add(entry)
          for entry in sorted(allowed):
              print("note: optional DA3 stack above the floor (macOS 14+ only): " + entry)
          if bad:
              print("FATAL: these bundled wheels target a macOS newer than the macOS 12")
              print("support floor. They import on this macOS 14 build host but fail to")
              print("dlopen on a user's older Mac:")
              for entry in sorted(bad):
                  print("  " + entry)
              print("Pin the package in sidecar/pyproject.toml to a version whose macOS")
              print("wheel targets macosx_12 or lower (or, if it is an optional heavy")
              print("dep that is macOS 14+ anyway, add it to ALLOW_ABOVE_FLOOR).")
              sys.exit(1)
          print("all required wheels are within the macOS 12 support floor")
          PYEOF
          fi

      - name: Package and publish
        shell: bash
        run: |
          # macOS's default open-file limit (256) is too low for electron-builder
          # to code-sign the many small files in the bundled Python interpreter,
          # which fails with EMFILE. Raise it where the shell allows; this is a
          # no-op on the Windows runner (git-bash), which does not hit the limit.
          ulimit -n 65536 2>/dev/null || ulimit -n 10240 2>/dev/null || true
          pnpm --filter @monoclejs/desktop exec electron-builder ${{ matrix.builder }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

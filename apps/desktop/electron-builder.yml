appId: dev.monoclejs.desktop
productName: MONOCLE
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
  # Exclude Turbo's per-package build logs. The workspace libraries are linked
  # into node_modules, and their .turbo/turbo-build.log resolves outside the app
  # root, which makes app-builder-lib throw "must be under .../apps/desktop".
  - '!**/.turbo'
  - '!**/.turbo/**'
asarUnpack:
  # Native addons must live outside asar. onnxruntime-node lands here if added.
  - '**/*.node'
extraResources:
  # The Python inference sidecar is copied verbatim and resolved via
  # process.resourcesPath at runtime. The virtualenv and caches are excluded.
  - from: ../../sidecar
    to: sidecar
    filter:
      - '**/*'
      - '!.venv/**'
      - '!**/__pycache__/**'
      - '!dist/**'
      - '!build/**'
  # The relocatable interpreter with the sidecar installed, produced per
  # platform by scripts/bundle-python.mjs (npm run bundle:python). When only the
  # committed .gitkeep is present this copies nothing usable and the app falls
  # back to a dev venv or system Python; see docs/BUILD.md and src/main/python.ts.
  - from: resources/python
    to: python
    filter:
      - '**/*'
      - '!**/__pycache__/**'
      # torch ships thousands of tiny C++/CUDA headers and a test suite that are
      # dead weight at inference time. Excluding them shrinks the app by tens of
      # MB and, crucially, keeps macOS code-signing from exhausting the open-file
      # limit on that header tree (EMFILE while signing torch/include/ATen/ops).
      - '!**/torch/include/**'
      - '!**/torch/test/**'
  # The bundled Depth Anything V2 ONNX so the sidecar reconstructs offline,
  # without a first-scan Hugging Face download. Produced by bundle-python.mjs;
  # the app points the sidecar at it via MONOCLE_DA2_ONNX (see src/main/index.ts).
  - from: resources/models
    to: models
    filter:
      - '**/*'
mac:
  icon: build/icon.png
  category: public.app-category.graphics-design
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing uses CSC_LINK / CSC_KEY_PASSWORD; notarization is performed when the
  # APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER env vars are present.
  extendInfo:
    NSCameraUsageDescription: MONOCLE uses your camera to capture frames for 3D scanning.
    NSMicrophoneUsageDescription: MONOCLE does not record audio; this is present only for capture APIs.
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
  # Signing uses CSC_LINK / CSC_KEY_PASSWORD (a base64 .pfx) when present.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icon.png
  category: Graphics
  synopsis: Webcam 3D scanning suite
  target:
    # AppImage covers both arches (and is the portable choice for Raspberry Pi).
    - target: AppImage
      arch: [x64, arm64]
    # deb only on x64: electron-builder builds .deb with a bundled fpm whose Ruby
    # is an x86 binary, so on an arm64 runner it dies with "cannot execute binary
    # file: Exec format error". arm64 users install the AppImage instead.
    - target: deb
      arch: [x64]
publish:
  provider: github
  # Explicit owner/repo so publishing does not depend on electron-builder
  # detecting the repository from .git/config or package.json in CI.
  owner: virgilvox
  repo: MONOCLE

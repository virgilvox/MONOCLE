appId: dev.monoclejs.desktop
productName: MONOCLE
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
asarUnpack:
  # Native addons must live outside asar. onnxruntime-node lands here when added.
  - '**/*.node'
extraResources:
  # The Python inference sidecar is copied verbatim and resolved via
  # process.resourcesPath at runtime. Weights are downloaded on first run.
  - from: ../../sidecar
    to: sidecar
    filter:
      - '**/*'
      - '!.venv/**'
      - '!**/__pycache__/**'
mac:
  category: public.app-category.graphics-design
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: MONOCLE uses your camera to capture frames for 3D scanning.
    NSMicrophoneUsageDescription: MONOCLE does not record audio; this is present only for capture APIs.
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
linux:
  category: Graphics
  target:
    - target: AppImage
      arch: [arm64, x64]
publish: null
